---
# Agent Wazuh : installation + enrolement (etape 0) PUIS configuration (etape 1)
#   - detection des acces 404 (logs Nginx)
#   - surveillance d'integrite (FIM) d'un fichier sensible
# Lancement : ansible-playbook wazuh_agent.yml   (ajouter --ask-become-pass si besoin)

- name: Installation et configuration de l'agent Wazuh
  hosts: localhost
  connection: local
  become: true

  vars:
    wazuh_version: "4.11.0"
    wazuh_manager: "127.0.0.1"
    agent_name: "hackathon-host"
    ossec_conf: /var/ossec/etc/ossec.conf
    nginx_access_log: /home/nicolas/hackatonM1/nginx/logs/access.log
    fim_dir: /etc/m1tech

  tasks:
    # ---------- ETAPE 0 : INSTALLATION DE L'AGENT ----------
    - name: Installer les prerequis (curl, gnupg)
      ansible.builtin.apt:
        name: [curl, gnupg]
        state: present
        update_cache: true

    - name: Importer la cle GPG Wazuh
      ansible.builtin.shell:
        cmd: >-
          curl -s https://packages.wazuh.com/key/GPG-KEY-WAZUH |
          gpg --no-default-keyring --keyring gnupg-ring:/usr/share/keyrings/wazuh.gpg --import &&
          chmod 644 /usr/share/keyrings/wazuh.gpg
        creates: /usr/share/keyrings/wazuh.gpg

    - name: Ajouter le depot Wazuh
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/wazuh.gpg] https://packages.wazuh.com/4.x/apt/ stable main"
        filename: wazuh
        state: present

    - name: Installer l'agent Wazuh (enrole sur le manager local)
      ansible.builtin.apt:
        name: "wazuh-agent={{ wazuh_version }}-1"
        state: present
        update_cache: true
      environment:
        WAZUH_MANAGER: "{{ wazuh_manager }}"
        WAZUH_AGENT_NAME: "{{ agent_name }}"

    - name: Figer la version de l'agent
      ansible.builtin.dpkg_selections:
        name: wazuh-agent
        selection: hold

    - name: Activer et demarrer l'agent
      ansible.builtin.service:
        name: wazuh-agent
        state: started
        enabled: true

    # ---------- ETAPE 1 : CONFIGURATION ----------
    - name: Creer le repertoire sensible surveille (FIM)
      ansible.builtin.file:
        path: "{{ fim_dir }}"
        state: directory
        mode: "0750"

    - name: Deposer le fichier sensible de reference (baseline)
      ansible.builtin.copy:
        dest: "{{ fim_dir }}/secret.conf"
        content: "db_password=initial\n"
        mode: "0600"
        force: false

    - name: Surveiller les logs Nginx (acces 404)
      ansible.builtin.blockinfile:
        path: "{{ ossec_conf }}"
        marker: "<!-- {mark} ANSIBLE MANAGED - localfile nginx -->"
        insertbefore: "</ossec_config>"
        block: |
          <localfile>
            <log_format>syslog</log_format>
            <location>{{ nginx_access_log }}</location>
          </localfile>
      notify: Redemarrer l'agent Wazuh

    - name: Activer la surveillance d'integrite (FIM) du dossier sensible
      ansible.builtin.blockinfile:
        path: "{{ ossec_conf }}"
        marker: "  <!-- {mark} ANSIBLE MANAGED - FIM m1tech -->"
        insertbefore: "</syscheck>"
        block: |
          <directories check_all="yes" report_changes="yes" realtime="yes">{{ fim_dir }}</directories>
      notify: Redemarrer l'agent Wazuh

    - name: Verifier la validite de la configuration de l'agent
      ansible.builtin.command: /var/ossec/bin/wazuh-agentd -t
      changed_when: false

  handlers:
    - name: Redemarrer l'agent Wazuh
      ansible.builtin.service:
        name: wazuh-agent
        state: restarted
