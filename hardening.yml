---
# Partie 4 - Durcissement securite de l'hote : SSH + UFW + Fail2Ban
# Garde-fous anti-lockout :
#   - verification que le compte admin existe AVANT de toucher sshd
#   - validation de sshd_config (sshd -t) avant tout redemarrage
#   - port 22 autorise AVANT l'activation du pare-feu
#   - l'authentification par mot de passe n'est PAS desactivee (evite le verrouillage)
# Lancement : ansible-playbook hardening.yml   (ajouter --ask-become-pass si besoin)

- name: Durcissement securite de l'hote (Partie 4)
  hosts: localhost
  connection: local
  become: true

  vars:
    # IMPORTANT : compte autorise a se connecter en SSH (adapte-le si besoin)
    admin_user: nicolas
    # Ports ouverts dans le pare-feu
    allowed_ports:
      - { port: "22",   proto: "tcp", comment: "SSH" }
      - { port: "80",   proto: "tcp", comment: "Site web Nginx" }
      - { port: "443",  proto: "tcp", comment: "Dashboard Wazuh" }
      - { port: "3001", proto: "tcp", comment: "Uptime Kuma" }

  tasks:
    # ---------- GARDE-FOU ----------
    - name: Verifier que le compte admin existe (anti-lockout)
      ansible.builtin.command: "id {{ admin_user }}"
      changed_when: false

    # ---------- 1. DURCISSEMENT SSH ----------
    - name: Durcir sshd_config (root off, utilisateurs restreints, max tentatives)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        validate: "sshd -t -f %s"     # refuse d'ecrire une conf invalide
      loop:
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^#?MaxAuthTries',    line: 'MaxAuthTries 3' }
        - { regexp: '^#?AllowUsers',      line: 'AllowUsers {{ admin_user }}' }
      notify: Redemarrer SSH

    # ---------- 2. PARE-FEU UFW ----------
    - name: Installer UFW
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true

    - name: Autoriser les ports necessaires (AVANT activation)
      ansible.builtin.command: "ufw allow {{ item.port }}/{{ item.proto }}"
      loop: "{{ allowed_ports }}"
      register: ufw_allow
      changed_when: "'Skipping' not in ufw_allow.stdout"

    - name: Politique par defaut - refuser les connexions entrantes
      ansible.builtin.command: ufw default deny incoming
      register: ufw_default
      changed_when: "'changed to' in ufw_default.stdout"

    - name: Activer UFW
      ansible.builtin.command: ufw --force enable
      register: ufw_enable
      changed_when: "'active' in ufw_enable.stdout"

    # ---------- 3. FAIL2BAN ----------
    - name: Installer Fail2Ban
      ansible.builtin.apt:
        name: fail2ban
        state: present

    - name: Configurer la prison SSH
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.d/sshd.local
        content: |
          [sshd]
          enabled  = true
          backend  = systemd
          maxretry = 3
          findtime = 600
          bantime  = 3600
        mode: "0644"
      notify: Redemarrer Fail2Ban

    - name: Activer et demarrer Fail2Ban
      ansible.builtin.service:
        name: fail2ban
        state: started
        enabled: true

  handlers:
    - name: Redemarrer SSH
      ansible.builtin.service:
        name: ssh
        state: restarted

    - name: Redemarrer Fail2Ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted
